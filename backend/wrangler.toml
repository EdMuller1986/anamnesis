name = "anamnesis-backend"
main = "src/index.js"
compatibility_date = "2024-05-02"

[[d1_databases]]
binding = "DB"
database_name = "anamnesis_db"
database_id = "YOUR_D1_DATABASE_ID"  # Replace with your D1 database ID from Cloudflare dashboard

# B2 Credentials (via environment variables for security)
[vars]
CORS_ORIGINS = "*"
B2_ENDPOINT = "s3.us-east-005.backblazeb2.com"  # Or your Backblaze B2 region endpoint
B2_BUCKET_NAME = "YOUR_BUCKET_NAME"  # Replace with your B2 bucket name
B2_KEY_ID = "YOUR_KEY_ID"  # Replace with your B2 key ID
# B2_APPLICATION_KEY — set via `wrangler secret put B2_APPLICATION_KEY`
