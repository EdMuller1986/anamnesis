name = "anamnesis-backend"
main = "src/index.js"
compatibility_date = "2024-05-02"

# D1 Database binding
# Get database_id by running: wrangler d1 create anamnesis_db
[[d1_databases]]
binding = "DB"
database_name = "anamnesis_db"
database_id = "REPLACE_WITH_YOUR_DATABASE_ID"

# Environment variables and secrets
# Create these via GitHub Secrets and wrangler secret put
[vars]
CORS_ORIGINS = "https://yourdomain.com"  # Set to your domain in production

# Secrets (use: wrangler secret put <KEY>)
# B2_KEY_ID - from Backblaze B2
# B2_APPLICATION_KEY - from Backblaze B2
# ADMIN_TOKEN - generate with: openssl rand -hex 32
