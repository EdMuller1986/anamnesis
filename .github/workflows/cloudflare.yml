name: Deploy to Cloudflare

on:
  push:
    branches:
      - master  # Changed from 'main' to match your branch name
  workflow_dispatch:  # Allow manual triggering from GitHub UI
    inputs:
      deploy_backend:
        description: 'Deploy backend (Workers)'
        required: false
        default: 'true'
        type: boolean
      deploy_frontend:
        description: 'Deploy frontend (Pages)'
        required: false
        default: 'true'
        type: boolean

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_backend == 'true') }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Use Node 22 LTS (20 is deprecated)
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Create wrangler.toml from secrets
        run: |
          cd backend
          cat > wrangler.toml << EOF
          name = "anamnesis-backend"
          main = "src/index.js"
          compatibility_date = "2024-05-02"

          [[d1_databases]]
          binding = "DB"
          database_name = "anamnesis_db"
          database_id = "${{ secrets.D1_DATABASE_ID }}"

          [vars]
          CORS_ORIGINS = "*"
          B2_ENDPOINT = "${{ secrets.B2_ENDPOINT }}"
          B2_BUCKET_NAME = "${{ secrets.B2_BUCKET_NAME }}"
          B2_KEY_ID = "${{ secrets.B2_KEY_ID }}"
          EOF

      - name: Deploy Worker
        run: npx wrangler@3 deploy
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ !cancelled() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == 'true')) }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Use Node 22 LTS (20 is deprecated)
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          # Set API URL for production build
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy dist --project-name=anamnesis-frontend
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
