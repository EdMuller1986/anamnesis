name: Deploy to Cloudflare

on:
  push:
    branches:
      - master  # Changed from 'main' to match your branch name
  workflow_dispatch:  # Allow manual triggering from GitHub UI
    inputs:
      deploy_backend:
        description: 'Deploy backend (Workers)'
        required: false
        default: 'true'
        type: boolean
      deploy_frontend:
        description: 'Deploy frontend (Pages)'
        required: false
        default: 'true'
        type: boolean

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Presence of All Required Secrets
        run: |
          MISSING=0
          check_presence() {
            if [ -z "${1}" ]; then
              echo "❌ Error: Secret ${2} is missing!"
              MISSING=1
            fi
          }
          check_presence "${{ secrets.CLOUDFLARE_API_TOKEN }}" "CLOUDFLARE_API_TOKEN"
          check_presence "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" "CLOUDFLARE_ACCOUNT_ID"
          check_presence "${{ secrets.D1_DATABASE_ID }}" "D1_DATABASE_ID"
          check_presence "${{ secrets.B2_ENDPOINT }}" "B2_ENDPOINT"
          check_presence "${{ secrets.B2_BUCKET_NAME }}" "B2_BUCKET_NAME"
          check_presence "${{ secrets.B2_KEY_ID }}" "B2_KEY_ID"
          check_presence "${{ secrets.B2_APPLICATION_KEY }}" "B2_APPLICATION_KEY"
          check_presence "${{ secrets.VITE_API_URL }}" "VITE_API_URL"
          check_presence "${{ secrets.CORS_ORIGINS }}" "CORS_ORIGINS"

          if [ $MISSING -eq 1 ]; then
            exit 1
          fi

      - name: Functional Check - Cloudflare & D1
        run: |
          echo "Verifying Cloudflare Token and Account..."
          if ! npx wrangler@3 whoami; then
            echo "::error::Cloudflare Token or Account ID is invalid."
            exit 1
          fi

          echo "Checking D1 Database Access..."
          DB_INFO=$(npx wrangler@3 d1 list --remote --json)
          if [ $? -ne 0 ]; then
            echo "::error::Failed to list D1 databases."
            echo "$DB_INFO"
            exit 1
          fi

          if ! echo "$DB_INFO" | grep -q "${{ secrets.D1_DATABASE_ID }}"; then
            echo "::error::D1_DATABASE_ID (${{ secrets.D1_DATABASE_ID }}) not found in your Cloudflare account."
            echo "Available databases:"
            echo "$DB_INFO" | jq -r '.[] | "- \(.name) (\(.uuid))"' || echo "$DB_INFO"
            exit 1
          fi
          
          echo "✅ Cloudflare & D1 Connectivity OK"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Functional Check - Backblaze B2
        run: |
          echo "Checking Backblaze B2 connectivity..."
          CLEAN_ENDPOINT=$(echo "${{ secrets.B2_ENDPOINT }}" | sed -E 's/^https?:\/\///')
          REGION=$(echo "$CLEAN_ENDPOINT" | cut -d. -f2)
          
          export AWS_ACCESS_KEY_ID="${{ secrets.B2_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.B2_APPLICATION_KEY }}"
          export AWS_DEFAULT_REGION="$REGION"
          
          if ! aws s3api head-bucket --bucket "${{ secrets.B2_BUCKET_NAME }}" --endpoint-url "https://$CLEAN_ENDPOINT" 2>&1; then
            echo "::error::Backblaze B2 connection failed. Check credentials, bucket name, and endpoint."
            # Show the error message from AWS CLI
            aws s3api head-bucket --bucket "${{ secrets.B2_BUCKET_NAME }}" --endpoint-url "https://$CLEAN_ENDPOINT" || true
            exit 1
          fi
          echo "✅ Backblaze B2 Connectivity OK"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: validate-secrets
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_backend == 'true') }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Use Node 22 LTS (20 is deprecated)
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Create wrangler.toml from secrets
        run: |
          cd backend
          cat > wrangler.toml << EOF
          name = "anamnesis-backend"
          main = "src/index.js"
          compatibility_date = "2024-05-02"
          compatibility_flags = ["nodejs_compat"]

          [[d1_databases]]
          binding = "DB"
          database_name = "anamnesis-db"
          database_id = "${{ secrets.D1_DATABASE_ID }}"

          [vars]
          CORS_ORIGINS = "${{ secrets.CORS_ORIGINS }}"
          B2_ENDPOINT = "${{ secrets.B2_ENDPOINT }}"
          B2_BUCKET_NAME = "${{ secrets.B2_BUCKET_NAME }}"
          B2_KEY_ID = "${{ secrets.B2_KEY_ID }}"
          B2_APPLICATION_KEY = "${{ secrets.B2_APPLICATION_KEY }}"
          EOF

      - name: Deploy Worker
        run: npx wrangler@3 deploy
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ !cancelled() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == 'true')) }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Use Node 22 LTS (20 is deprecated)
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          # Set API URL for production build
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy dist --project-name=anamnesis-frontend
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
